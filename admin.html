<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/alpinejs" defer></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>

<body class="bg-black text-white p-6">

<div x-data="admin()" x-init="init()">

<button @click="login">Login</button>

<div x-show="isAdmin">

<input x-model="name" placeholder="Name" class="text-black">
<input x-model="price" placeholder="Price" class="text-black">
<input type="file" @change="upload">

<button @click="add">Add</button>

</div>

</div>

<script>
const ADMIN_EMAIL="vedantbhalge2006@gmail.com";

firebase.initializeApp({
 apiKey: "AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg",
 authDomain: "kurozenaku-gundam-store.firebaseapp.com",
 projectId: "kurozenaku-gundam-store",
 storageBucket:"kurozenaku-gundam-store.firebasestorage.app"
});

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

function admin(){
return{

user:null,
isAdmin:false,
name:'',price:'',image:'',

init(){
 auth.onAuthStateChanged(u=>{
  this.user=u;
  this.isAdmin=u && u.email===ADMIN_EMAIL;
 });
},

login(){
 auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
},

async upload(e){
 const file=e.target.files[0];
 const ref=storage.ref("products/"+Date.now());
 await ref.put(file);
 this.image=await ref.getDownloadURL();
},

async add(){
 await db.collection("products").add({
  name:this.name,
  price:Number(this.price),
  image:this.image,
  stock:10,
  category:"HG"
 });
 alert("Added");
}

}
}
</script>

</body>
</html>
