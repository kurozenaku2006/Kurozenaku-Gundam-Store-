<!DOCTYPE html>
<html>
<head>
<title>Kurozenaku Store</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/alpinejs" defer></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body class="bg-black text-white">

<div x-data="app()" x-init="init()" class="p-6 max-w-7xl mx-auto">

<div class="flex justify-between mb-4">
<h1 class="text-2xl">KUROZENAKU</h1>
<button @click="menuOpen=true">☰</button>
</div>

<input x-model="search" placeholder="Search..."
class="p-2 text-black w-full mb-4 rounded">

<div class="flex gap-2 mb-4">
<button @click="category='ALL'">All</button>
<button @click="category='HG'">HG</button>
<button @click="category='MG'">MG</button>
<button @click="category='PG'">PG</button>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<template x-for="p in filteredProducts()" :key="p.id">
<div class="bg-white/10 p-3 rounded">

<img :src="p.image" class="h-40 w-full object-contain cursor-pointer"
@click="openProduct(p)">

<h2 x-text="p.name"></h2>
<p>₹<span x-text="p.price"></span></p>

<p class="text-red-400 text-xs" x-show="p.stock==0">Sold Out</p>

<button @click="addToCart(p)" class="bg-yellow-400 text-black w-full mt-2"
:disabled="p.stock==0">Cart</button>

<button @click="buyNow(p)" class="bg-white text-black w-full mt-2"
:disabled="p.stock==0">Buy</button>

</div>
</template>
</div>

</div>

<script>
firebase.initializeApp({
 apiKey: "AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg",
 authDomain: "kurozenaku-gundam-store.firebaseapp.com",
 projectId: "kurozenaku-gundam-store"
});

const auth = firebase.auth();
const db = firebase.firestore();

function app(){
return{

products:[],
cart:JSON.parse(localStorage.getItem("cart")||"[]"),
search:'',
category:'ALL',
user:null,

init(){
 auth.onAuthStateChanged(async u=>{
  this.user=u;
  await this.loadProducts();
 });
},

async loadProducts(){
 const snap=await db.collection("products").get();
 this.products=snap.docs.map(d=>({id:d.id,...d.data()}));
},

filteredProducts(){
 return this.products.filter(p=>
  p.name.toLowerCase().includes(this.search.toLowerCase()) &&
  (this.category==='ALL'||p.category===this.category)
 );
},

addToCart(p){
 if(p.stock<=0) return;

 let i=this.cart.find(x=>x.id===p.id);
 if(i)i.qty++; else this.cart.push({...p,qty:1});

 localStorage.setItem("cart",JSON.stringify(this.cart));
},

async buyNow(p){
 if(!this.user){alert("Login first");return;}
 if(p.stock<=0){alert("Out of stock");return;}

 const token=await this.user.getIdToken();

 const res=await fetch("https://kurozenaku-gundam-store.onrender.com/create-order",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   "Authorization":"Bearer "+token
  },
  body:JSON.stringify({productId:p.id})
 });

 const order=await res.json();

 const rzp=new Razorpay({
  key:"rzp_test_SgYsK7uNNdSaph",
  amount:order.amount,
  order_id:order.id,
  handler: async (resp)=>{
   await fetch("https://kurozenaku-gundam-store.onrender.com/verify",{
    method:"POST",
    headers:{
     "Content-Type":"application/json",
     "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
     order_id:order.id,
     payment_id:resp.razorpay_payment_id,
     signature:resp.razorpay_signature
    })
   });
   alert("Payment Success");
  }
 });

 rzp.open();
}

}
}
</script>

</body>
</html>
