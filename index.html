<!DOCTYPE html>
<html>
<head>
<title>Kurozenaku Store</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/alpinejs" defer></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body { background:#0a0a0a; }
.glass {
 backdrop-filter: blur(12px);
 background: rgba(255,255,255,0.05);
 border: 1px solid rgba(255,255,255,0.1);
}
.card:hover {
 transform: translateY(-6px) scale(1.02);
}
</style>
</head>

<body class="text-white">

<div x-data="app()" x-init="init()" class="p-6 max-w-7xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between mb-6 items-center">
<h1 class="text-3xl font-bold">KUROZENAKU</h1>

<div class="flex gap-3 items-center">

<span x-show="user" x-text="user.displayName"></span>

<button @click="view='orders'">Orders</button>

<button x-show="isAdmin" @click="view='admin'"
class="bg-yellow-400 text-black px-3 py-2 rounded">
Admin
</button>

<button x-show="!user" @click="login"
class="bg-white text-black px-3 py-2 rounded">
Login
</button>

<button x-show="user" @click="logout"
class="bg-red-500 px-3 py-2 rounded">
Logout
</button>

</div>
</div>

<!-- SHOP -->
<div x-show="view==='shop'" class="grid grid-cols-2 md:grid-cols-4 gap-6">

<template x-for="p in products" :key="p.id">
<div class="glass p-4 rounded-xl card">

<img :src="p.image" class="h-40 w-full object-contain">

<h2 x-text="p.name"></h2>
<p>₹<span x-text="p.price"></span></p>

<p class="text-xs"
:class="p.stock==0 && !p.preorder ? 'text-red-400' : p.preorder ? 'text-yellow-400':'text-green-400'">

<span x-text="
p.stock==0 && !p.preorder ? 'SOLD OUT' :
p.preorder ? 'PREORDER' :
'IN STOCK'
"></span>

</p>

<button @click="buyNow(p)"
:disabled="p.stock==0 && !p.preorder"
class="bg-white text-black w-full mt-2 py-1 rounded">
Buy Now
</button>

</div>
</template>

</div>

<!-- ORDERS -->
<div x-show="view==='orders'">

<template x-for="o in orders" :key="o.id">
<div class="glass p-4 mb-3 rounded">

<p x-text="o.productName"></p>
<p>Status: <span x-text="o.status"></span></p>
<p>Total: ₹<span x-text="o.totalPrice"></span></p>

<p class="text-yellow-400" x-show="o.type==='PREORDER'">
PREORDER ITEM
</p>

<p x-show="o.deliveryDate">
Delivery: <span x-text="o.deliveryDate"></span>
</p>

</div>
</template>

</div>

<!-- ADMIN -->
<div x-show="view==='admin'" class="glass p-4 rounded">

<h2 class="text-xl mb-3">Admin Panel</h2>

<input x-model="name" placeholder="Name" class="text-black p-2 mb-2 w-full">
<input x-model="price" placeholder="Price" class="text-black p-2 mb-2 w-full">
<input x-model="stock" placeholder="Stock" class="text-black p-2 mb-2 w-full">
<input x-model="image" placeholder="Image URL" class="text-black p-2 mb-2 w-full">
<input x-model="deliveryDate" placeholder="Delivery Date (YYYY-MM-DD)" class="text-black p-2 mb-2 w-full">

<label class="flex items-center gap-2">
<input type="checkbox" x-model="preorder">
Preorder Product
</label>

<button @click="addProduct()"
class="bg-blue-500 px-4 py-2 mt-3 rounded">
Add Product
</button>

</div>

</div>

<script>
firebase.initializeApp({
apiKey: "AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg",
  authDomain: "kurozenaku-gundam-store.firebaseapp.com",
  projectId: "kurozenaku-gundam-store"
});

const auth = firebase.auth();
const db = firebase.firestore();

function app(){
return{

view:'shop',
user:null,
isAdmin:false,

products:[],
orders:[],

name:'',price:'',stock:'',image:'',deliveryDate:'',
preorder:false,

init(){

// HANDLE REDIRECT LOGIN
auth.getRedirectResult().catch(()=>{});

// AUTH STATE
auth.onAuthStateChanged(u=>{
 this.user = u;
 console.log("Logged in:", u?.email);

 this.isAdmin = u && u.email === "vedantbhalge2006@gmail.com";

 if(u) this.loadOrders();
});

// LOAD PRODUCTS
db.collection("products").onSnapshot(snap=>{
 this.products = snap.docs.map(d=>({id:d.id,...d.data()}));
});

},

// LOGIN FIXED
async login(){
 try{
  await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
 }catch{
  await auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());
 }
},

logout(){
 auth.signOut();
},

// 🔥 FIXED ADMIN ADD
async addProduct(){
 try{

  if(!this.isAdmin){
    alert("❌ Not admin");
    return;
  }

  if(!this.name || !this.price){
    alert("Fill name & price");
    return;
  }

  const data = {
    name:this.name,
    price:Number(this.price),
    stock:Number(this.stock || 0),
    image:this.image || "",
    preorder:this.preorder,
    deliveryDate:this.deliveryDate || null,
    createdAt:new Date()
  };

  console.log("Adding:", data);

  await db.collection("products").add(data);

  alert("✅ Product Added");

  // RESET
  this.name='';
  this.price='';
  this.stock='';
  this.image='';
  this.deliveryDate='';
  this.preorder=false;

 }catch(e){
  console.error(e);
  alert("Error: " + e.message);
 }
},

async buyNow(p){

if(!this.user){
 alert("Login first");
 return;
}

if(p.stock==0 && !p.preorder){
 alert("Sold Out");
 return;
}

const token = await this.user.getIdToken();

const res = await fetch("https://kurozenaku-gundam-store.onrender.com/create-order",{
 method:"POST",
 headers:{
  "Content-Type":"application/json",
  "Authorization":"Bearer "+token
 },
 body:JSON.stringify({productId:p.id})
});

const order = await res.json();

const rzp = new Razorpay({
 key:"rzp_test_SgYsK7uNNdSaph",
 amount:order.amount,
 order_id:order.id,

 handler: async (response)=>{
  await fetch("https://kurozenaku-gundam-store.onrender.com/verify",{
   method:"POST",
   headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer "+token
   },
   body:JSON.stringify({
    order_id:order.id,
    payment_id:response.razorpay_payment_id,
    signature:response.razorpay_signature
   })
  });

  alert("Payment Success");
 }
});

rzp.open();
},

async loadOrders(){
const token = await this.user.getIdToken();

const res = await fetch("https://kurozenaku-gundam-store.onrender.com/orders",{
 headers:{Authorization:"Bearer "+token}
});

this.orders = await res.json();
}

}
}
</script>

</body>
</html>
