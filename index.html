<!DOCTYPE html>
<html>
<head>
<title>Kurozenaku Store</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<link rel="icon" href="data:,">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body class="bg-gradient-to-b from-black via-gray-900 to-black text-white min-h-screen">

<div x-data="app()" class="p-6 max-w-7xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
<h1 class="text-3xl font-bold">KUROZENAKU</h1>

<button @click="menuOpen=true" class="bg-white/10 px-3 py-2 rounded">
☰ Menu
</button>
</div>

<!-- SEARCH + FILTER -->
<div class="flex gap-2 mb-4">
<button @click="filterOpen=true" class="bg-white/10 px-3 rounded">☰</button>

<input x-model="search"
placeholder="Search Gundam kits..."
class="flex-1 p-2 text-black rounded"/>
</div>

<!-- FILTER DRAWER -->
<div x-show="filterOpen"
class="fixed top-0 left-0 h-full w-60 bg-gray-900 z-50 p-4">

<h2 class="mb-4 text-lg font-semibold">Category</h2>

<template x-for="c in ['ALL','HG','MG','PG','EG','RG','SD']">
<button @click="category=c; filterOpen=false"
class="block w-full text-left mb-2 bg-white/10 px-3 py-2 rounded hover:bg-white/20"
x-text="c"></button>
</template>

<button @click="filterOpen=false"
class="mt-4 w-full bg-red-500 py-2 rounded">
Close
</button>

</div>

<!-- PRODUCTS -->
<div x-show="view==='shop'" class="grid grid-cols-2 md:grid-cols-4 gap-4">
<template x-for="p in filteredProducts()" :key="p.id">
<div class="bg-white/10 p-3 rounded">

<img :src="p.image" class="h-40 w-full object-contain">

<h2 x-text="p.name"></h2>
<p>₹<span x-text="p.price"></span></p>

<button @click="addToCart(p)" class="bg-yellow-400 text-black w-full mt-2 py-1">Cart</button>
<button @click="toggleWish(p)" class="w-full mt-1">❤️</button>
<button @click="buyNow()" class="bg-white text-black w-full mt-2 py-1">Buy</button>

</div>
</template>
</div>

<!-- CART -->
<div x-show="view==='cart'">
<h2 class="text-xl mb-4">Cart</h2>

<template x-for="item in cart">
<div class="flex justify-between border-b py-2">
<span x-text="item.name"></span>

<div>
<button @click="item.qty++">+</button>
<span x-text="item.qty"></span>
<button @click="item.qty--">-</button>
</div>

</div>
</template>

<p>Total: ₹<span x-text="total()"></span></p>
</div>

<!-- WISHLIST -->
<div x-show="view==='wishlist'">
<h2 class="text-xl mb-4">Wishlist</h2>
</div>

<!-- ORDERS -->
<div x-show="view==='orders'">
<h2 class="text-xl mb-4">Orders</h2>
</div>

<!-- TRACKING -->
<div x-show="view==='tracking'">
<h2 class="text-xl mb-4">Tracking</h2>
</div>

<!-- ADMIN -->
<div x-show="view==='admin'" class="bg-white/10 p-4 rounded">
<h2 class="text-xl mb-4">Admin Panel</h2>

<input x-model="name" placeholder="Product Name"
class="text-black p-2 w-full mb-2">

<input x-model="price" placeholder="Price"
class="text-black p-2 w-full mb-2">

<select x-model="newCategory" class="text-black p-2 w-full mb-2">
<option>HG</option>
<option>MG</option>
<option>PG</option>
<option>RG</option>
<option>EG</option>
<option>SD</option>
</select>

<button @click="addProduct()"
class="bg-blue-500 px-4 py-2 w-full">
Add Product
</button>
</div>

<!-- OVERLAY -->
<div x-show="menuOpen" @click="menuOpen=false"
class="fixed inset-0 bg-black/60 z-40"></div>

<!-- MENU DRAWER -->
<div x-show="menuOpen"
class="fixed top-0 right-0 h-full w-72 bg-gradient-to-b from-gray-900 to-blue-950 z-50 p-5">

<div class="flex justify-between mb-4">
<button @click="menuOpen=false" class="bg-white/10 px-3 py-1 rounded">✕</button>
<h2>Menu</h2>
</div>

<button @click="go('shop')" class="w-full mb-2 bg-white/10 py-2 rounded">🛍 Shop</button>

<button @click="go('cart')" class="w-full mb-2 bg-white/10 py-2 rounded">
🛒 Cart (<span x-text="cart.length"></span>)
</button>

<button @click="go('wishlist')" class="w-full mb-2 bg-white/10 py-2 rounded">❤️ Wishlist</button>

<button @click="go('orders')" class="w-full mb-2 bg-white/10 py-2 rounded">📦 Orders</button>

<button @click="go('tracking')" class="w-full mb-2 bg-white/10 py-2 rounded">🚚 Tracking</button>

<!-- USER SECTION -->
<div class="mt-6 border-t border-white/20 pt-4">

<div x-show="!user">
<button @click="login()" class="w-full bg-blue-500 py-2 rounded mb-2">
Login with Google
</button>
</div>

<div x-show="user">
<p class="text-sm mb-2" x-text="user.email"></p>

<button @click="logout()" class="w-full bg-red-500 py-2 rounded mb-2">
Logout
</button>

<button x-show="isAdmin" @click="go('admin')"
class="w-full py-2 rounded bg-gradient-to-r from-purple-500 to-pink-500">
⚙ Admin
</button>
</div>

</div>

</div>

</div>

<script>
window.app = function () {
return {

menuOpen:false,
filterOpen:false,
view:'shop',

products:[],
cart:[],
wishlist:[],

search:'',
category:'ALL',

user:null,
isAdmin:false,

name:'',
price:'',
newCategory:'HG',

init(){
this.initFirebase();
this.loadProducts();
},

initFirebase(){
try{
firebase.initializeApp({
apiKey: "YOUR_API_KEY",
authDomain: "kurozenaku-gundam-store.firebaseapp.com",
projectId: "kurozenaku-gundam-store"
});

firebase.auth().onAuthStateChanged(u=>{
this.user = u;
this.isAdmin = u && u.email === "vedantbhalge2006@gmail.com";
});
}catch(e){
console.log("Firebase init error");
}
},

loadProducts(){
try{
const db = firebase.firestore();

db.collection("products").onSnapshot(s=>{
this.products = s.docs.map(d=>({id:d.id,...d.data()}));
});
}catch(e){
this.products = [
{id:1,name:"HG Gundam",price:2000,image:"https://via.placeholder.com/150",category:"HG"}
];
}
},

login(){
const provider = new firebase.auth.GoogleAuthProvider();

firebase.auth().signInWithPopup(provider)
.then(result=>{
console.log("Login success", result.user);
})
.catch(error=>{
console.error("LOGIN ERROR:", error);
alert(error.message);
});
},

logout(){
firebase.auth().signOut();
},

addProduct(){
if(!this.name || !this.price) return alert("Fill all fields");

firebase.firestore().collection("products").add({
name:this.name,
price:Number(this.price),
category:this.newCategory,
image:"https://via.placeholder.com/150"
});

this.name='';
this.price='';
},

filteredProducts(){
return this.products.filter(p=>
(p.name||'').toLowerCase().includes(this.search.toLowerCase()) &&
(this.category==='ALL'||p.category===this.category)
);
},

addToCart(p){
let i=this.cart.find(x=>x.id===p.id);
if(i)i.qty++; else this.cart.push({...p,qty:1});
},

total(){
return this.cart.reduce((t,i)=>t+i.price*i.qty,0);
},

toggleWish(p){
let w=this.wishlist.find(x=>x.id===p.id);
if(w)this.wishlist=this.wishlist.filter(x=>x.id!==p.id);
else this.wishlist.push(p);
},

go(v){
this.view=v;
this.menuOpen=false;
},

buyNow(){
alert("Buy working");
}

}
}
</script>

</body>
</html>
