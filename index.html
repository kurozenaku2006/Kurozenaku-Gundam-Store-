<!DOCTYPE html>
<html>
<head>
<title>Kurozenaku Store</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- FIXED Alpine -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<link rel="icon" href="data:,">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body class="bg-gradient-to-b from-black via-gray-900 to-black text-white min-h-screen">

<!-- IMPORTANT CHANGE HERE -->
<div x-data="app" x-init="init()" class="p-6 max-w-7xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
<h1 class="text-3xl font-bold">KUROZENAKU</h1>

<button @click="menuOpen=true" class="bg-white/10 px-3 py-2 rounded">
☰ Menu
</button>
</div>

<!-- CATEGORY -->
<div class="flex gap-2 mb-4">
<button @click="category='ALL'">All</button>
<button @click="category='HG'">HG</button>
<button @click="category='MG'">MG</button>
<button @click="category='PG'">PG</button>
</div>

<!-- SEARCH -->
<input x-model="search" placeholder="Search Gundam kits..." class="w-full p-2 mb-4 text-black rounded"/>

<!-- PRODUCTS -->
<div x-show="view==='shop'" class="grid grid-cols-2 md:grid-cols-4 gap-4">

<template x-for="p in filteredProducts()" :key="p.id">
<div class="bg-white/10 p-3 rounded">

<img :src="p.image" class="h-40 w-full object-contain">

<h2 x-text="p.name"></h2>
<p>₹<span x-text="p.price"></span></p>

<button @click="addToCart(p)" class="bg-yellow-400 text-black w-full mt-2">Cart</button>
<button @click="toggleWish(p)" class="w-full mt-1">❤️</button>
<button @click="buyNow(p)" class="bg-white text-black w-full mt-2">Buy</button>

</div>
</template>

</div>

<!-- CART -->
<div x-show="view==='cart'">
<h2 class="text-xl mb-4">Cart</h2>

<template x-for="item in cart">
<div class="flex justify-between border-b py-2">
<span x-text="item.name"></span>
<span x-text="item.qty"></span>
</div>
</template>

</div>

<!-- DRAWER -->
<div x-show="menuOpen"
class="fixed top-0 right-0 h-full w-72 bg-gradient-to-b from-gray-900 to-blue-950 z-50 p-5 flex flex-col">

<div class="flex items-center justify-between mb-4">
<button @click="menuOpen=false" class="text-xl px-3 py-1 bg-white/10 rounded">✕</button>
<h2 class="text-lg font-bold">Menu</h2>
</div>

<button @click="view='shop'; menuOpen=false"
class="bg-white/10 hover:bg-white/20 w-full py-2 mb-2 rounded flex gap-2 px-3">
🛍 Shop
</button>

<button @click="view='cart'; menuOpen=false"
class="bg-white/10 hover:bg-white/20 w-full py-2 mb-2 rounded flex gap-2 px-3">
🛒 Cart (<span x-text="cart.length"></span>)
</button>

<button @click="view='wishlist'; menuOpen=false"
class="bg-white/10 hover:bg-white/20 w-full py-2 mb-2 rounded flex gap-2 px-3">
❤️ Wishlist
</button>

<button @click="view='orders'; menuOpen=false"
class="bg-white/10 hover:bg-white/20 w-full py-2 mb-2 rounded flex gap-2 px-3">
📦 Orders
</button>

<button @click="view='tracking'; menuOpen=false"
class="bg-white/10 hover:bg-white/20 w-full py-2 mb-2 rounded flex gap-2 px-3">
🚚 Tracking
</button>

<button x-show="isAdmin"
@click="view='admin'; menuOpen=false"
class="bg-gradient-to-r from-purple-500 to-pink-500 w-full py-2 rounded flex justify-center">
⚙ Admin
</button>
</div>

</div>

<script>
firebase.initializeApp({
 apiKey: "AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg",
 authDomain: "kurozenaku-gundam-store.firebaseapp.com",
 projectId: "kurozenaku-gundam-store"
});

const auth = firebase.auth();
const db = firebase.firestore();

/* 🔥 CRITICAL FIX */
document.addEventListener('alpine:init', () => {

Alpine.data('app', () => ({

menuOpen:false,
view:'shop',

products:[],
cart:[],

search:'',
category:'ALL',

init(){
console.log("Alpine working");

db.collection("products").onSnapshot(s=>{
 this.products = s.docs.map(d=>({id:d.id,...d.data()}));
});
},

filteredProducts(){
return this.products;
},

addToCart(p){
this.cart.push({...p,qty:1});
},

toggleWish(p){
alert("Wishlist toggle");
},

buyNow(p){
alert("Buy clicked");
}

}));

});
</script>

</body>
</html>
